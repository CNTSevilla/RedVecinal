services:
  mysql:
    image: mysql:8.0
    container_name: redvecinal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: redvecinal_root
      MYSQL_DATABASE: redvecinal
      MYSQL_USER: redvecinal
      MYSQL_PASSWORD: redvecinal_pass
      TZ: Europe/Madrid
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-predvecinal_root"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    container_name: redvecinal-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: redvecinal
      DB_PASSWORD: redvecinal_pass
      DB_NAME: redvecinal
      PORT: 3001
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
